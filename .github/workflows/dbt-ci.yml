name: dbt CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dbt-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cafe_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-postgres

      - name: Create dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          transform:
            outputs:
              dev:
                type: postgres
                host: localhost
                port: 5432
                dbname: cafe_db
                user: postgres
                pass: postgres
                schema: public
                threads: 4
            target: dev
          EOF

      - name: Install dbt packages
        run: dbt deps --project-dir transform/

      - name: Seed source tables
        run: dbt seed --project-dir transform/

      - name: Run dbt build
        run: dbt build --project-dir transform/
