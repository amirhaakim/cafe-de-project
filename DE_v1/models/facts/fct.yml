version : 2

models:
  - name: fct_table
    columns:
      - name: transaction_id
        tests:
          - not_null
          - unique
      - name: date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: item_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_item')
                field: item_key
      - name: payment_method_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_payment_method')
                field: payment_method_key
      - name: location_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_location')
                field: location_key
      - name: quantity
      - name: price_per_unit
      - name: total_spent
      - name: is_total_reconciled
